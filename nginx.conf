server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ──────────────────────────────────────────────────────────
    # All routes fall back to index.html so React handles client-side navigation
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── PWA: service worker must be served from root with no caching ─────────
    location ~* (service-worker\.js|sw\.js|workbox-.+\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Service-Worker-Allowed "/";
        expires off;
    }

    # ── PWA manifest ─────────────────────────────────────────────────────────
    location ~* \.(webmanifest|manifest\.json)$ {
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }

    # ── Static assets: long-lived cache (Vite hashes filenames) ─────────────
    location ~* \.(js|css|png|svg|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Geolocation and notifications require a secure context (HTTPS).
    # When running behind a reverse proxy (e.g. Caddy, Nginx, Cloudflare),
    # the proxy handles TLS and this container receives plain HTTP — that's fine.
    # For local development over HTTP, Chrome treats localhost as secure.
    # For a remote server, put this container behind a TLS-terminating proxy.

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
